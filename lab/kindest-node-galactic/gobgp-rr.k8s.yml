---
apiVersion: v1
kind: Namespace
metadata:
  name: galactic-rr
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: galactic-rr-config
  namespace: galactic-rr
data:
  # Minimal GoBGP RR config. Accepts iBGP from any peer in the same
  # ASN, reflects all received paths. ASN must match the operator's
  # --asn and the agent's --bgp-asn.
  gobgpd.toml: |
    [global.config]
      as = 65000
      router-id = "10.0.0.254"
      port = 179

    [[neighbors]]
      [neighbors.config]
        peer-as = 65000
      [neighbors.transport.config]
        passive-mode = true
      [[neighbors.afi-safis]]
        [neighbors.afi-safis.config]
          afi-safi-name = "ipv4-l3vpn"
      [[neighbors.afi-safis]]
        [neighbors.afi-safis.config]
          afi-safi-name = "ipv6-l3vpn"
      [neighbors.route-reflector.config]
        route-reflector-client = true
        route-reflector-cluster-id = "10.0.0.254"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: galactic-rr
  namespace: galactic-rr
  labels:
    app.kubernetes.io/name: galactic-rr
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: galactic-rr
  template:
    metadata:
      labels:
        app.kubernetes.io/name: galactic-rr
    spec:
      hostNetwork: true
      containers:
        - name: gobgpd
          image: jauderho/gobgp:latest
          command: ["gobgpd"]
          args: ["-f", "/etc/gobgp/gobgpd.toml"]
          volumeMounts:
            - name: config
              mountPath: /etc/gobgp
      volumes:
        - name: config
          configMap:
            name: galactic-rr-config
