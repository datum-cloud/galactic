---
apiVersion: v1
kind: Namespace
metadata:
  name: galactic-agent

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: galactic-agent-config-gen-script
  namespace: galactic-agent
  labels:
    app.kubernetes.io/name: galactic-agent
data:
  # Per-node config generator. Each worker advertises a distinct
  # node-locator (its own SRv6 next-hop) but shares the cluster
  # POP-locator and ASN with every other node.
  config-gen.py: |
    import os
    import json


    CONFIGS = {
        "k01-worker":  {"node_locator": "2001:db8:ff01::1"},
        "k01-worker2": {"node_locator": "2001:db8:ff02::1"},
        "k01-worker3": {"node_locator": "2001:db8:ff03::1"},
        "k01-worker4": {"node_locator": "2001:db8:ff04::1"},
        "k01-worker5": {"node_locator": "2001:db8:ff05::1"},
    }


    node_name = os.getenv("NODE_NAME")
    if not node_name:
        raise ValueError("NODE_NAME environment variable not set")

    if node_name not in CONFIGS:
        raise ValueError(f"Unknown worker: {node_name}. Valid workers: {', '.join(CONFIGS.keys())}")

    cfg = {
        # Cluster-wide values (must match operator's --pop-locator and --asn).
        "srv6_net": "2001:db8:ff00::/56",
        "bgp_asn": 65000,
        "bgp_srv6_encoding": "tunnel-encap",
        # RR is the lab's GoBGP RR running on the control-plane host network.
        "bgp_rr_peer": ["10.0.0.254"],
        # Per-node values.
        "node_locator": CONFIGS[node_name]["node_locator"],
        "bgp_router_id": CONFIGS[node_name]["node_locator"].split("::")[0] + ".1",
    }

    print("Generating config")
    with open("/config/galactic-agent.json", "w") as f:
        f.write(json.dumps(cfg, indent=2))

---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: galactic-agent
  namespace: galactic-agent
  labels:
    app.kubernetes.io/instance: galactic-agent
    app.kubernetes.io/name: galactic-agent
spec:
  selector:
    matchLabels:
      app.kubernetes.io/instance: galactic-agent
      app.kubernetes.io/name: galactic-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: galactic-agent
        app.kubernetes.io/name: galactic-agent
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
      initContainers:
        - name: config-gen
          image: python:3.11-slim
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          command:
            - /bin/sh
            - -c
            - |
              python /script/config-gen.py && \
              cat /config/galactic-agent.json
          volumeMounts:
            - name: script
              mountPath: /script
              readOnly: true
            - name: config
              mountPath: /config
      containers:
        - name: galactic-agent
          image: ghcr.io/datum-cloud/galactic-agent:latest
          imagePullPolicy: Always
          args:
            - "--config=/config/galactic-agent.json"
          ports:
            - name: health
              containerPort: 8081
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              # /healthz fails if BGP can't establish; /metrics being
              # served means the process is up. Liveness checks the
              # latter so a misconfigured RR doesn't crash-loop the
              # pod — readiness keeps it out of service routing.
              path: /metrics
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 30
          volumeMounts:
            - name: galactic-run
              mountPath: /var/run/galactic
            - name: config
              mountPath: /config
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
                - NET_RAW
      hostNetwork: true
      volumes:
        - name: galactic-run
          hostPath:
            path: /var/run/galactic
            type: DirectoryOrCreate
        - name: config
          emptyDir: {}
        - name: script
          configMap:
            name: galactic-agent-config-gen-script
