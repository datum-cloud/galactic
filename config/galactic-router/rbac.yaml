apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: galactic-router
rules:
  - apiGroups: ["network.datumapis.com"]
    resources:
      - bgprouters
      - bgppeers
      - bgppolicies
    verbs: ["get", "list", "watch", "update", "patch"]
  # bgpadvertisements/bgpvrfinstances also need delete: the GC reconciler
  # periodically removes orphaned CRDs left behind when CNI DEL never fires
  # (e.g. a force-terminated container).
  - apiGroups: ["network.datumapis.com"]
    resources:
      - bgpadvertisements
      - bgpvrfinstances
    verbs: ["get", "list", "watch", "update", "patch", "delete"]
  - apiGroups: ["network.datumapis.com"]
    resources:
      - bgprouters/status
      - bgppeers/status
      - bgpadvertisements/status
      - bgppolicies/status
      - bgpvrfinstances/status
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources:
      - secrets
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources:
      - nodes
    verbs: ["get", "list", "watch"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: galactic-router
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: galactic-router
subjects:
  - kind: ServiceAccount
    name: galactic-router
    namespace: galactic-system
