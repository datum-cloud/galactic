apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: galactic-cni
  namespace: galactic-system
  labels:
    app.kubernetes.io/name: galactic-cni
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: galactic-cni
  template:
    metadata:
      labels:
        app.kubernetes.io/name: galactic-cni
    spec:
      serviceAccountName: galactic-cni
      tolerations:
        - operator: Exists
      # Only worker nodes run VPC pods; galactic-cni has nothing to do on
      # control-plane nodes. Opt-in only so new node types (GPU, monitoring,
      # etc.) don't accidentally pick up the CNI.
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
                  - key: galactic.datumapis.com/node
                    operator: In
                    values:
                      - edge
      initContainers:
        - name: install-cni
          # ":latest" is a placeholder only: no such tag is ever pushed to
          # GHCR. CI resolves and stamps a real version tag here when it
          # publishes the ghcr.io/datum-cloud/galactic-kustomize OCI bundle
          # (see .github/workflows/publish.yaml); applying this manifest
          # directly from a git checkout will fail to pull the image unless
          # you override the tag first — see the README's "Production
          # Deployment" section.
          image: ghcr.io/datum-cloud/galactic-cni:latest
          command: ["/bin/sh", "/scripts/install.sh", "install"]
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          securityContext:
            runAsUser: 0
            allowPrivilegeEscalation: false
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
          volumeMounts:
            - name: install-script
              mountPath: /scripts
            - name: cni-bin-dir
              mountPath: /host/opt/cni/bin
            - name: galactic-etc
              mountPath: /host/var/lib/galactic
            - name: galactic-state
              mountPath: /host/var/run/galactic-cni
      containers:
        - name: credential-refresh
          # See the install-cni initContainer above: ":latest" is a
          # placeholder, not a published tag.
          image: ghcr.io/datum-cloud/galactic-cni:latest
          command: ["/bin/sh", "/scripts/install.sh", "refresh"]
          securityContext:
            runAsUser: 0
            allowPrivilegeEscalation: false
          resources:
            requests:
              cpu: 5m
              memory: 16Mi
            limits:
              memory: 32Mi
          volumeMounts:
            - name: install-script
              mountPath: /scripts
            - name: galactic-etc
              mountPath: /host/var/lib/galactic
      volumes:
        - name: install-script
          configMap:
            name: galactic-cni-install
            defaultMode: 0555
        - name: cni-bin-dir
          hostPath:
            path: /opt/cni/bin
            type: DirectoryOrCreate
        - name: galactic-etc
          hostPath:
            path: /var/lib/galactic
            type: DirectoryOrCreate
        - name: galactic-state
          hostPath:
            path: /var/run/galactic-cni
            type: DirectoryOrCreate
