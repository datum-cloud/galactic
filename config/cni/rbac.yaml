apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: galactic-cni
rules:
  - apiGroups: ["network.datumapis.com"]
    resources:
      - bgprouters
    verbs: ["get", "list"]
  - apiGroups: ["network.datumapis.com"]
    resources:
      - bgpadvertisements
      - bgpvrfinstances
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources:
      - nodes
    verbs: ["get"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: galactic-cni
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: galactic-cni
subjects:
  - kind: ServiceAccount
    name: galactic-cni
    namespace: galactic-system
