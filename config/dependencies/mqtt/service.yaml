apiVersion: v1
kind: Service
metadata:
  name: mqtt
  namespace: galactic-mqtt
  labels:
    app: mqtt
spec:
  type: ClusterIP
  selector:
    app: galactic-mqtt
  ports:
    - port: 1883
      targetPort: 1883
      protocol: TCP
      name: mqtt
---
apiVersion: v1
kind: Service
metadata:
  name: mqtt-nodeport
  namespace: galactic-mqtt
  labels:
    app: mqtt
spec:
  type: NodePort
  selector:
    app: galactic-mqtt
  ports:
    - port: 1883
      targetPort: 1883
      nodePort: 31883
      protocol: TCP
      name: mqtt
