apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: galactic-node-setup
  namespace: galactic-agent
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: galactic-node-setup
  template:
    metadata:
      labels:
        app.kubernetes.io/name: galactic-node-setup
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
      hostNetwork: true
      hostPID: true
      initContainers:
        - name: node-setup
          image: alpine:3.20
          securityContext:
            privileged: true
          command:
            - /bin/sh
            - -c
            - |
              set -e
              # Install ip6tables if not available (alpine base image)
              if ! command -v ip6tables >/dev/null 2>&1; then
                apk add --no-cache iptables ip6tables 2>/dev/null || true
              fi
              SRV6_PREFIX="2001:db8:ff00::/40"
              # SRv6 prefix forwarding
              ip6tables -C FORWARD -s ${SRV6_PREFIX} -j ACCEPT 2>/dev/null || \
                ip6tables -I FORWARD 1 -s ${SRV6_PREFIX} -j ACCEPT
              ip6tables -C FORWARD -d ${SRV6_PREFIX} -j ACCEPT 2>/dev/null || \
                ip6tables -I FORWARD 1 -d ${SRV6_PREFIX} -j ACCEPT
              # VRF module (best-effort, may not be available in all environments)
              modprobe --quiet --dry-run vrf && modprobe vrf || true
              sysctl -w net.vrf.strict_mode=1 || true
              # lo-galactic loopback device used as nexthop for SRv6 egress routes
              if ! ip link show lo-galactic >/dev/null 2>&1; then
                ip link add name lo-galactic type dummy
                ip link set lo-galactic up
              fi
              # SRv6 sysctls
              for iface in all default lo; do
                sysctl -w net.ipv4.conf.${iface}.forwarding=1
                sysctl -w net.ipv4.conf.${iface}.rp_filter=0
                sysctl -w net.ipv6.conf.${iface}.forwarding=1
                sysctl -w net.ipv6.conf.${iface}.accept_ra=0
                sysctl -w net.ipv6.conf.${iface}.autoconf=0
                sysctl -w net.ipv6.conf.${iface}.seg6_enabled=1
              done
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.9
      tolerations:
        - operator: Exists
