apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../default
images:
  - name: ghcr.io/datum-cloud/galactic
    newName: ghcr.io/datum-cloud/galactic
    newTag: e2e-local
patches:
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: IfNotPresent
    target:
      kind: Deployment
      name: galactic-operator-controller-manager
