apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: galactic-router
  labels:
    app.kubernetes.io/name: galactic-router-control
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: galactic-router-control
  template:
    metadata:
      labels:
        app.kubernetes.io/name: galactic-router-control
    spec:
      # Route-reflector role: opt-in only, requires nodes explicitly labeled
      # for it, so it never double-schedules with the per-worker tenant
      # DaemonSet (see ../tenant/daemonset-patch.yaml). Also excludes
      # Kubernetes control-plane nodes outright — the base DaemonSet's
      # blanket toleration would otherwise let it land there if one ever
      # carried the galactic.datumapis.com/node=control label.
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
                  - key: galactic.datumapis.com/node
                    operator: In
                    values:
                      - control
      containers:
        - name: galactic-router
          env:
            - name: GALACTIC_ROUTER_REFLECTOR
              value: "true"
            - name: GALACTIC_ROUTER_BGP_LISTEN_PORT
              value: "1790"
              # GALACTIC_ROUTER_BGP_LOCAL_ADDRESS is auto-detected from the
              # host's lo interface by default (the stable peering address
              # other tenant routers reflect through). Set it explicitly here
              # only if lo doesn't carry the desired address on this cluster.
