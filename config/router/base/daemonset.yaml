apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: galactic-router
  namespace: galactic-system
  labels:
    app.kubernetes.io/name: galactic-router
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: galactic-router
  template:
    metadata:
      labels:
        app.kubernetes.io/name: galactic-router
    spec:
      serviceAccountName: galactic-router
      hostNetwork: true
      tolerations:
        - operator: Exists
      containers:
        - name: galactic-router
          # ":latest" is a placeholder only: no such tag is ever pushed to
          # GHCR. CI resolves and stamps a real version tag here when it
          # publishes the ghcr.io/datum-cloud/galactic-kustomize OCI bundle
          # (see .github/workflows/publish.yaml); applying this manifest
          # directly from a git checkout will fail to pull the image unless
          # you override the tag first — see the README's "Production
          # Deployment" section.
          image: ghcr.io/datum-cloud/galactic-router:latest
          command:
            - /galactic-router
          env:
            - name: GALACTIC_ROUTER_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: GALACTIC_ROUTER_ROUTER_MODE
              value: tenant
            - name: GALACTIC_ROUTER_GC_NAMESPACE
              value: galactic-system
            # Talos nodes permanently bind 127.0.0.1:5000 for the built-in
            # /sbin/dashboard; since this DaemonSet runs hostNetwork: true,
            # the default gRPC health port (5000) always collides on Talos.
            # See docs/router/configuration.md for details.
            - name: GALACTIC_ROUTER_GRPC_HEALTH_PORT
              value: "5179"
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: grpc-health
              containerPort: 5179
              protocol: TCP
          livenessProbe:
            grpc:
              port: 5179
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            grpc:
              port: 5179
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            runAsUser: 0
            capabilities:
              add:
                - NET_ADMIN
            allowPrivilegeEscalation: false
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
          volumeMounts:
            # GC (internal/gc) checks whether a container's netns bind-mount
            # still exists on the host to decide whether shared BGP CRDs/VRFs
            # are orphaned. Without this mount the container has no
            # visibility into /var/run/netns at all, so that check always
            # (and incorrectly) reports every namespace as gone.
            - name: netns
              mountPath: /var/run/netns
              readOnly: true
      volumes:
        - name: netns
          hostPath:
            path: /var/run/netns
            type: DirectoryOrCreate
