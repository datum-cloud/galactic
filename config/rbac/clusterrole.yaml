apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: galactic-router
rules:
  # BGP CRD read access.
  - apiGroups:
      - bgp.miloapis.com
    resources:
      - bgprouters
      - bgppeers
      - bgpadvertisements
      - bgppolicies
    verbs:
      - get
      - list
      - watch
  # BGP CRD status subresource write access.
  - apiGroups:
      - bgp.miloapis.com
    resources:
      - bgprouters/status
      - bgppeers/status
      - bgpadvertisements/status
      - bgppolicies/status
    verbs:
      - update
      - patch
  # Secret read access for BGP session authentication.
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - get
      - list
      - watch
  # Node read access for IPv6 address resolution.
  - apiGroups:
      - ""
    resources:
      - nodes
    verbs:
      - get
      - list
      - watch
  # Event write access for controller-runtime event recording.
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch
