apiVersion: bgp.miloapis.com/v1alpha1
kind: BGPPolicy
metadata:
  name: tenant-import
  namespace: default
spec:
  routerRef:
    name: tenant-node1
  direction: import
  terms:
    - sequence: 10
      match:
        addressFamilies:
          - afi: l2vpn
            safi: evpn
      action: permit
      set:
        localPreference: 100
