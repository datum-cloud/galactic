apiVersion: v1
kind: ServiceAccount
metadata:
  name: galactic-agent
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: galactic-agent
rules:
  # Nodes: nodepeer operator watches nodes; agent annotates its own node.
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch", "patch"]
  # BGPConfiguration: nodepeer reads AS number from the global config.
  - apiGroups: ["bgp.miloapis.com"]
    resources: ["bgpconfigurations"]
    verbs: ["get", "list", "watch"]
  # BGPEndpoint: nodepeer creates/updates/deletes endpoints for each node.
  - apiGroups: ["bgp.miloapis.com"]
    resources: ["bgpendpoints"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["bgp.miloapis.com"]
    resources: ["bgpendpoints/status"]
    verbs: ["get", "update", "patch"]
  # BGPAdvertisement: nodepeer creates SRv6 prefix advertisements per node.
  - apiGroups: ["bgp.miloapis.com"]
    resources: ["bgpadvertisements"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["bgp.miloapis.com"]
    resources: ["bgpadvertisements/status"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: galactic-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: galactic-agent
subjects:
  - kind: ServiceAccount
    name: galactic-agent
