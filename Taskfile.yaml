version: '3'

vars:
  IMG: '{{.IMG | default "ghcr.io/datum-cloud/galactic:latest"}}'
  CONTAINER_TOOL: '{{.CONTAINER_TOOL | default "docker"}}'
  LOCALBIN:
    sh: echo "$(pwd)/bin"
  GOBIN:
    sh: |
      gobin=$(go env GOBIN)
      [ -n "$gobin" ] && echo "$gobin" || echo "$(go env GOPATH)/bin"
  GOLANGCI_LINT: '{{.LOCALBIN}}/golangci-lint'
  GO_LICENSES: '{{.LOCALBIN}}/go-licenses'
  PROTOC_GEN_GO: '{{.LOCALBIN}}/protoc-gen-go'
  PROTOC_GEN_GO_GRPC: '{{.LOCALBIN}}/protoc-gen-go-grpc'
  GOLANGCI_LINT_VERSION: v2.12.2
  GO_LICENSES_VERSION: v1.6.0
  PROTOC_GEN_GO_VERSION: v1.36.11
  PROTOC_GEN_GO_GRPC_VERSION: v1.6.1

tasks:
  default:
    silent: true
    cmds:
      - task --list

  ##
  ## Development
  ##

  fmt:
    desc: Run go fmt against code
    run: once
    cmds:
      - go fmt ./...

  vet:
    desc: Run go vet against code
    run: once
    cmds:
      - GOOS=linux go vet ./...

  test:
    desc: Run tests
    deps: [fmt, vet]
    cmds:
      - GOOS=linux go test $(go list ./... | grep -v /e2e) -coverprofile cover.out

  lint:
    desc: Run golangci-lint linter
    deps: [golangci-lint]
    cmds:
      - '{{.GOLANGCI_LINT}} run'

  lint-fix:
    desc: Run golangci-lint linter and perform fixes
    deps: [golangci-lint]
    cmds:
      - '{{.GOLANGCI_LINT}} run --fix'

  hooks:
    desc: Install git pre-commit hooks (requires pre-commit; pip install pre-commit)
    deps: [golangci-lint]
    cmds:
      - pre-commit install

  notice:
    desc: Generate NOTICE file with third-party dependency license information
    deps: [go-licenses]
    cmds:
      - '{{.GO_LICENSES}} report ./... --ignore go.datum.net/galactic --template scripts/licenses/notice.tmpl > NOTICE'

  ##
  ## Build
  ##

  proto:
    desc: Regenerate protobuf and gRPC Go code from .proto files (requires protoc v29.3 in PATH; see https://github.com/protocolbuffers/protobuf/releases)
    deps: [protoc-gen-go, protoc-gen-go-grpc]
    cmds:
      - |
        PATH={{.LOCALBIN}}:$PATH protoc \
          --go_out=. --go_opt=paths=source_relative \
          --go-grpc_out=. --go-grpc_opt=paths=source_relative \
          pkg/proto/local/local.proto

  build:
    desc: Build galactic binary
    deps: [fmt, vet]
    cmds:
      - go build -o bin/galactic cmd/galactic/main.go

  run-agent:
    desc: Run agent from your host
    deps: [fmt, vet]
    cmds:
      - go run ./cmd/galactic/main.go agent

  docker-build:
    desc: Build docker image with the unified binary
    cmds:
      - '{{.CONTAINER_TOOL}} build -t {{.IMG}} -f containers/galactic/Dockerfile .'

  ##
  ## Cleanup
  ##

  clean:
    desc: Remove build artifacts and temporary files
    cmds:
      - rm -rf bin/
      - rm -rf dist/
      - rm -f cover.out

  ##
  ## Dependencies
  ##

  golangci-lint:
    desc: Download golangci-lint locally if necessary
    run: once
    cmds:
      - task: install-tool
        vars:
          TARGET: '{{.GOLANGCI_LINT}}'
          PACKAGE: github.com/golangci/golangci-lint/v2/cmd/golangci-lint
          VERSION: '{{.GOLANGCI_LINT_VERSION}}'

  go-licenses:
    internal: true
    run: once
    cmds:
      - task: install-tool
        vars:
          TARGET: '{{.GO_LICENSES}}'
          PACKAGE: github.com/google/go-licenses
          VERSION: '{{.GO_LICENSES_VERSION}}'

  protoc-gen-go:
    internal: true
    run: once
    cmds:
      - task: install-tool
        vars:
          TARGET: '{{.PROTOC_GEN_GO}}'
          PACKAGE: google.golang.org/protobuf/cmd/protoc-gen-go
          VERSION: '{{.PROTOC_GEN_GO_VERSION}}'

  protoc-gen-go-grpc:
    internal: true
    run: once
    cmds:
      - task: install-tool
        vars:
          TARGET: '{{.PROTOC_GEN_GO_GRPC}}'
          PACKAGE: google.golang.org/grpc/cmd/protoc-gen-go-grpc
          VERSION: '{{.PROTOC_GEN_GO_GRPC_VERSION}}'

  install-tool:
    internal: true
    cmds:
      - mkdir -p {{.LOCALBIN}}
      - |
        if [ ! -f "{{.TARGET}}-{{.VERSION}}" ]; then
          echo "Downloading {{.PACKAGE}}@{{.VERSION}}"
          rm -f "{{.TARGET}}" || true
          GOBIN={{.LOCALBIN}} go install {{.PACKAGE}}@{{.VERSION}}
          mv "{{.TARGET}}" "{{.TARGET}}-{{.VERSION}}"
        fi
        ln -sf "{{.TARGET}}-{{.VERSION}}" "{{.TARGET}}"
