# Install: pip install pre-commit && task hooks
# Update hook revs: pre-commit autoupdate
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        args: [--config-file, .yamllint.yaml]

  - repo: local
    hooks:
      - id: go-fmt
        name: gofmt
        language: system
        entry: gofmt -l -w
        types: [go]
        exclude: '(\.pb\.go|_grpc\.pb\.go)$'

      - id: go-vet
        name: go vet
        language: system
        entry: bash -c 'GOOS=linux go vet ./...'
        pass_filenames: false
        types: [go]

      - id: golangci-lint
        name: golangci-lint
        language: system
        entry: bin/golangci-lint run --fix
        pass_filenames: false
        types: [go]
