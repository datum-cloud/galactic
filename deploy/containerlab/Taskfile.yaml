version: '3'

vars:
  LAB:
    sh: awk '/^name:/ {print $2; exit}' *.clab.yaml
  TOPO:
    sh: echo *.clab.yaml
  FRR_VERSION: "10.6.1"
  FRR_IMAGE: frr:{{.FRR_VERSION}}

tasks:
  default:
    silent: true
    cmds:
      - task --list

  build:
    desc: Build all container images
    cmds:
      - task: "build:node"
      - task: "build:frr"
      - task: "build:galactic-router"
      - task: "build:galactic-cni"

  "build:node":
    desc: Build the Kind node image
    cmds:
      - docker build --network=host -t kindest/node:galactic -f containers/kindest-node-galactic/Dockerfile ../..

  "build:frr":
    desc: Build the FRR container from Alpine edge (v{{.FRR_VERSION}})
    status:
      - docker image inspect {{.FRR_IMAGE}} > /dev/null 2>&1
    cmds:
      - docker build --build-arg FRR_VERSION={{.FRR_VERSION}} -t {{.FRR_IMAGE}} containers/frr/

  "build:galactic-router":
    desc: Build the galactic-router container image
    cmds:
      - docker build --network=host -t galactic-router:latest -f containers/galactic-router/Dockerfile ../..

  "build:galactic-cni":
    desc: Build the galactic-cni installer image
    cmds:
      - docker build --network=host -t galactic-cni:latest -f ../../containers/galactic-cni/Dockerfile ../..

  deploy:
    desc: Build images and deploy the full lab end-to-end
    deps: [build, host-setup]
    cmds:
      - task: "deploy:clusters"
      - task: "deploy:topology"
      - task: "deploy:rename-control"
      - task: "deploy:images"
      - task: "deploy:system"
      - task: "deploy:cni"
      - task: "deploy:fabric"
      - task: "deploy:tenant"
      - task: "deploy:vpc"

  "deploy:clusters":
    desc: Create Kind clusters
    cmds:
      - kind create cluster --name dfw --config node_files/dfw/config.yaml --image kindest/node:galactic
      - kind create cluster --name sjc --config node_files/sjc/config.yaml --image kindest/node:galactic
      - kind create cluster --name iad --config node_files/iad/config.yaml --image kindest/node:galactic
      - kind export kubeconfig --name dfw --kubeconfig dfw.kubeconfig
      - kind export kubeconfig --name sjc --kubeconfig sjc.kubeconfig
      - kind export kubeconfig --name iad --kubeconfig iad.kubeconfig

  "deploy:topology":
    desc: Deploy the ContainerLab topology
    cmds:
      - sudo containerlab deploy -t {{.TOPO}}

  "deploy:rename-control":
    desc: Rename iad-worker2 to iad-worker-control
    cmds:
      - docker rename iad-worker2 iad-worker-control

  "load-image":
    internal: true
    desc: Load a docker image into a kind node via ctr (workaround for containerd v2 incompatibility)
    requires:
      vars: [IMAGE, NODE]
    cmds:
      - docker save {{.IMAGE}} | docker exec -i {{.NODE}} ctr --namespace k8s.io images import -

  "deploy:images":
    desc: Load all container images into the Kind clusters
    cmds:
      - task: load-image
        vars: {IMAGE: "{{.FRR_IMAGE}}", NODE: iad-worker}
      - task: load-image
        vars: {IMAGE: "{{.FRR_IMAGE}}", NODE: iad-worker-control}
      - task: load-image
        vars: {IMAGE: "{{.FRR_IMAGE}}", NODE: sjc-worker}
      - task: load-image
        vars: {IMAGE: "{{.FRR_IMAGE}}", NODE: dfw-worker}
      - task: load-image
        vars: {IMAGE: galactic-router:latest, NODE: iad-worker}
      - task: load-image
        vars: {IMAGE: galactic-router:latest, NODE: iad-worker-control}
      - task: load-image
        vars: {IMAGE: galactic-router:latest, NODE: sjc-worker}
      - task: load-image
        vars: {IMAGE: galactic-router:latest, NODE: dfw-worker}
      - task: load-image
        vars: {IMAGE: galactic-cni:latest, NODE: iad-worker}
      - task: load-image
        vars: {IMAGE: galactic-cni:latest, NODE: iad-worker-control}
      - task: load-image
        vars: {IMAGE: galactic-cni:latest, NODE: sjc-worker}
      - task: load-image
        vars: {IMAGE: galactic-cni:latest, NODE: dfw-worker}

  "deploy:system":
    desc: Install BGP and VPC CRDs; apply galactic-system namespace and shared RBAC
    cmds:
      - ./scripts/deploy-system.sh

  "deploy:cni":
    desc: Install Cilium and Multus, then the galactic-cni DaemonSet
    cmds:
      - ./scripts/deploy-cni.sh

  destroy:
    desc: Destroy the lab
    cmds:
      - sudo containerlab destroy -t {{.TOPO}} --cleanup
      - kind delete cluster --name dfw || true
      - kind delete cluster --name sjc || true
      - kind delete cluster --name iad || true

  reload:
    desc: Full rebuild and redeploy
    cmds:
      - task: destroy
      - task: deploy

  rebuild:
    desc: Rebuild the full deployment
    cmds:
      - task: clean
      - task: deploy

  inspect:
    desc: Inspect deployed nodes and management addresses
    cmds:
      - sudo containerlab inspect -t {{.TOPO}}

  graph:
    desc: Generate a draw.io diagram for the current topology
    cmds:
      - sudo containerlab graph -t {{.TOPO}} --drawio --drawio-dir .

  host-setup:
    desc: Apply host sysctls for this dual-stack lab
    cmds:
      - sudo ./scripts/host-setup.sh

  "deploy:fabric":
    desc: Install the FRR fabric DaemonSets
    cmds:
      - ./scripts/deploy-fabric.sh

  "deploy:tenant":
    desc: Install tenant DaemonSets, NAD, and BGP resources
    cmds:
      - ./scripts/deploy-tenant.sh

  "deploy:vpc":
    desc: Deploy vpc10 and vpc20 test workloads across all clusters (6 pods)
    cmds:
      - ./scripts/deploy-vpc.sh

  test:
    desc: Run all verification checks
    cmds:
      - task: "test:bgp-transit"
      - task: "test:bgp-fabric"
      - task: "test:bgp-peers"
      - task: "test:srv6"
      - task: "test:evpn"

  "test:bgp-transit":
    desc: Verify transit router BGP sessions (iBGP full mesh)
    cmds:
      - |
        for r in tr1 tr2 tr3 tr4; do
          echo "--- $r ---"
          docker exec clab-gvpc-$r vtysh -c "show bgp ipv6 unicast summary"
        done

  "test:bgp-fabric":
    desc: Verify fabric BGP sessions on dfw, iad, and sjc workers
    cmds:
      - |
        docker exec dfw-control-plane \
          kubectl exec -n galactic-system ds/dfw-fabric \
          -- vtysh -c "show bgp ipv6 unicast summary"
      - |
        docker exec iad-control-plane \
          kubectl exec -n galactic-system ds/iad-fabric \
          -- vtysh -c "show bgp ipv6 unicast summary"
      - |
        docker exec sjc-control-plane \
          kubectl exec -n galactic-system ds/sjc-fabric \
          -- vtysh -c "show bgp ipv6 unicast summary"
      - |
        docker exec iad-control-plane \
          kubectl exec -n galactic-system ds/iad-control-fabric \
          -- vtysh -c "show bgp ipv6 unicast summary"

  "test:bgp-peers":
    desc: Verify tenant BGP peer sessions (galactic-router embedded GoBGP)
    cmds:
      - docker exec dfw-control-plane kubectl get bgppeers -n galactic-system
      - docker exec sjc-control-plane kubectl get bgppeers -n galactic-system
      - docker exec iad-control-plane kubectl get bgppeers -n galactic-system

  "test:srv6":
    desc: Verify each site's aggregate SRv6 locator block on tr1
    cmds:
      - docker exec clab-gvpc-tr1 vtysh -c "show bgp ipv6 unicast 2001:db8:ff01::/48"
      - docker exec clab-gvpc-tr1 vtysh -c "show bgp ipv6 unicast 2001:db8:ff02::/48"
      - docker exec clab-gvpc-tr1 vtysh -c "show bgp ipv6 unicast 2001:db8:ff03::/48"

  "test:evpn":
    desc: Verify EVPN BGP routes on iad, sjc, and dfw via BGPRouter status
    cmds:
      - docker exec iad-control-plane kubectl get bgprouters -A
      - docker exec sjc-control-plane kubectl get bgprouters -A
      - docker exec dfw-control-plane kubectl get bgprouters -A

  clean:
    desc: Destroy the lab and delete artifacts
    cmds:
      - task: destroy
      - docker rmi kindest/node:galactic || true
      - docker rmi galactic-router:latest || true
      - docker rmi galactic-cni:latest || true
      - docker rmi {{.FRR_IMAGE}} || true
      - rm -rf clab-{{.LAB}} build/
      - rm -f dfw.kubeconfig sjc.kubeconfig iad.kubeconfig
