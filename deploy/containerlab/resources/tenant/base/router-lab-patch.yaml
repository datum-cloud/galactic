apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: galactic-router
spec:
  template:
    spec:
      tolerations:
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoSchedule
      # Node affinity (control-plane + route-reflector-node exclusion) comes
      # from base/tenant/daemonset-patch.yaml (config/router/tenant/); every
      # lab worker is labeled either galactic.datum.net/node=edge or =control
      # (see node_files/*/config.yaml), so excluding =control there has the
      # same effect as this used to get by requiring =edge here.
      containers:
        - name: galactic-router
          image: galactic-router:latest
          imagePullPolicy: Never
          env:
            - name: GALACTIC_ROUTER_BGP_LISTEN_PORT
              value: "-1"
