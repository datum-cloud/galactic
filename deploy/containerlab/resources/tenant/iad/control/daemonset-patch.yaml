apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: tenant
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: tenant-rr
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tenant-rr
    spec:
      tolerations:
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoSchedule
        - key: galactic.datum.net/node
          value: control
          effect: NoSchedule
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: galactic.datum.net/node
                    operator: In
                    values:
                      - control
      containers:
        - name: galactic-router
          env:
            - name: GALACTIC_ROUTER_BGP_LOCAL_ADDRESS
              value: "fc00:0:8::1"
            - name: GALACTIC_ROUTER_ROUTER_MODE
              value: tenant
            - name: GALACTIC_ROUTER_BGP_LISTEN_PORT
              value: "1790"
          livenessProbe:
            grpc:
              port: 5000
          readinessProbe:
            grpc:
              port: 5000
