apiVersion: apps/v1
kind: Deployment
metadata:
  name: testvpc-2
  namespace: vpc
  labels:
    app: testvpc-2
    site: dfw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: testvpc-2
  template:
    metadata:
      labels:
        app: testvpc-2
        site: dfw
      annotations:
        k8s.v1.cni.cncf.io/networks: testvpc-2
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
      containers:
        - name: multitool
          image: wbitt/network-multitool
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
