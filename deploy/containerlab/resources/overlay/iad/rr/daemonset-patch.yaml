apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: overlay
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: overlay-rr
  template:
    metadata:
      labels:
        app.kubernetes.io/name: overlay-rr
    spec:
      tolerations:
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoSchedule
        - key: galactic.io/role
          value: route-reflector
          effect: NoSchedule
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: galactic.io/role
                    operator: In
                    values:
                      - route-reflector
      containers:
        - name: galactic-router
          env:
            - name: BGP_LOCAL_ADDRESS
              value: "fc00:0:8::1"
            - name: ROUTER_ROLE
              value: tenant
            - name: BGP_LISTEN_PORT
              value: "1790"
          livenessProbe:
            grpc:
              port: 5000
          readinessProbe:
            grpc:
              port: 5000
