apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: overlay
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: overlay-rr
  template:
    metadata:
      labels:
        app.kubernetes.io/name: overlay-rr
    spec:
      tolerations:
        - key: galactic.io/role
          value: route-reflector
          effect: NoSchedule
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: galactic.io/role
                    operator: In
                    values:
                      - route-reflector
      containers:
        - name: galactic-agent
          args:
            - --port=33440
            - --health-port=5000
            - --role=overlay-rr
          livenessProbe:
            grpc:
              port: 5000
          readinessProbe:
            grpc:
              port: 5000
              service: readyz
