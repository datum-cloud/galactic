apiVersion: v1
kind: ServiceAccount
metadata:
  name: galactic-router
  namespace: galactic-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: galactic-router
rules:
  - apiGroups: ["bgp.miloapis.com"]
    resources:
      - bgprouters
      - bgppeers
      - bgpadvertisements
      - bgppolicies
    verbs: ["get", "list", "watch"]
  - apiGroups: ["bgp.miloapis.com"]
    resources:
      - bgprouters/status
      - bgppeers/status
      - bgpadvertisements/status
      - bgppolicies/status
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources:
      - secrets
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources:
      - nodes
    verbs: ["get", "list", "watch"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: galactic-router
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: galactic-router
subjects:
  - kind: ServiceAccount
    name: galactic-router
    namespace: galactic-system
