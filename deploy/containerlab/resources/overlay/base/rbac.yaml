apiVersion: v1
kind: ServiceAccount
metadata:
  name: galactic-agent
  namespace: galactic-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: galactic-agent
rules:
  - apiGroups: ["providers.bgp.miloapis.com"]
    resources:
      - bgpproviders
    verbs: ["get", "create", "update", "patch", "delete"]
  - apiGroups: ["providers.bgp.miloapis.com"]
    resources:
      - bgpproviders/status
    verbs: ["get", "update", "patch"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: galactic-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: galactic-agent
subjects:
  - kind: ServiceAccount
    name: galactic-agent
    namespace: galactic-system
