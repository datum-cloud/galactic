apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: overlay
  namespace: overlay
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: overlay
  template:
    metadata:
      labels:
        app.kubernetes.io/name: overlay
    spec:
      hostNetwork: true
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
      containers:
        - name: gobgp
          image: gobgp:4.5.0
          imagePullPolicy: Never
          command: ["gobgpd"]
          args: ["--api-hosts", ":50051", "--log-level", "debug"]
