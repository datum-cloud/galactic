apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: overlay
  namespace: galactic-system
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: overlay
  template:
    metadata:
      labels:
        app.kubernetes.io/name: overlay
    spec:
      serviceAccountName: galactic-agent
      hostNetwork: true
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
      containers:
        - name: galactic-agent
          image: galactic-agent:latest
          imagePullPolicy: Never
          args:
            - --port=33438
            - --health-port=5000
            - --role=overlay
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
          livenessProbe:
            grpc:
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            grpc:
              port: 5000
              service: readyz
            initialDelaySeconds: 5
            periodSeconds: 10
