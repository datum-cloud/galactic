apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: overlay
  namespace: galactic-system
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: overlay
  template:
    metadata:
      labels:
        app.kubernetes.io/name: overlay
    spec:
      serviceAccountName: galactic-router
      hostNetwork: true
      tolerations:
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoSchedule
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
      containers:
        - name: galactic-router
          image: galactic-router:latest
          imagePullPolicy: Never
          command:
            - /galactic-router
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: ROUTER_ROLE
              value: tenant
            - name: BGP_LISTEN_PORT
              value: "-1"
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: grpc-health
              containerPort: 5000
              protocol: TCP
          livenessProbe:
            grpc:
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            grpc:
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
