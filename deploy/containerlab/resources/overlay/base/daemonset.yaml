apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: overlay
  namespace: overlay
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: overlay
  template:
    metadata:
      labels:
        app.kubernetes.io/name: overlay
    spec:
      hostNetwork: true
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
      containers:
        - name: gobgp
          image: gobgp:3.37.0
          imagePullPolicy: Never
          command:
            - gobgpd
            - --api-hosts
            - :50051
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
                - NET_RAW
