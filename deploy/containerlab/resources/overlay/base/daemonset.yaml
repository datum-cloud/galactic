apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: overlay
  namespace: galactic-system
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: overlay
  template:
    metadata:
      labels:
        app.kubernetes.io/name: overlay
    spec:
      serviceAccountName: galactic-agent
      hostNetwork: true
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
      containers:
        - name: galactic-agent
          image: galactic-agent:latest
          imagePullPolicy: Never
          args:
            - --gobgp-enabled=true
            - --gobgp-api-port=50051
            - --gobgp-log-level=debug
            - --metrics-addr=:8082
            - --health-addr=:8083
            - --grpc-health-port=8084
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8083
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8083
            initialDelaySeconds: 5
            periodSeconds: 10
