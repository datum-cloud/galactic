apiVersion: v1
kind: ServiceAccount
metadata:
  name: galactic-cni
  namespace: galactic-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: galactic-cni
rules:
  - apiGroups: ["bgp.miloapis.com"]
    resources:
      - bgprouters
    verbs: ["get", "list"]
  - apiGroups: ["bgp.miloapis.com"]
    resources:
      - bgpadvertisements
      - bgpvrfinstances
    verbs: ["get", "list", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: galactic-cni
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: galactic-cni
subjects:
  - kind: ServiceAccount
    name: galactic-cni
    namespace: galactic-system
