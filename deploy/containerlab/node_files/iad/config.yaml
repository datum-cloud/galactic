apiVersion: kind.x-k8s.io/v1alpha4
kind: Cluster
nodes:
  - role: control-plane
  - role: worker
    labels:
      topology.kubernetes.io/region: iad
      galactic.datumapis.com/node: edge
  - role: worker
    labels:
      topology.kubernetes.io/region: iad
      galactic.datumapis.com/node: control
    kubeadmConfigPatches:
      - |
        kind: JoinConfiguration
        nodeRegistration:
          name: iad-worker-control
          taints:
            - key: galactic.datumapis.com/node
              value: control
              effect: NoSchedule
networking:
  ipFamily: ipv6
  disableDefaultCNI: true
  podSubnet: fd00:100::/48
  serviceSubnet: fd00:200::/108
