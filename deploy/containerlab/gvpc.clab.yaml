---
name: gvpc

mgmt:
  network: mgmt
  ipv6-subnet: fc00:10::/64

topology:
  defaults:
    kind: linux
    binds:
      - group_files/common/vtysh.conf:/etc/frr/vtysh.conf:ro
      - group_files/common/startup-lib.sh:/opt/lab/startup-lib.sh:ro
      - group_files/common/hosts:/etc/hosts:ro

  kinds:
    linux:
      image: frrouting/frr:latest

  nodes:
    dfw-control-plane:
      kind: ext-container
      labels:
        cluster: dfw
        graph-group: kind-control-plane
        graph-level: 1
        graph-icon: server
        platform: kind
        reload: disabled
      mgmt-ipv6: fc00:10::102
      sysctls:
        fs.inotify.max_user_instances: "256"
        net.ipv4.conf.all.arp_announce: "2"
        net.ipv4.ip_forward: "1"
        net.ipv6.conf.all.forwarding: "1"

    dfw-worker:
      kind: ext-container
      labels:
        cluster: dfw
        graph-group: kind-worker
        graph-level: 1
        graph-icon: server
        platform: kind
        reload: disabled
        worker-index: "1"
      mgmt-ipv6: fc00:10::103
      sysctls:
        fs.inotify.max_user_instances: "256"
        net.ipv4.conf.all.arp_announce: "2"
        net.ipv4.ip_forward: "1"
        net.ipv6.conf.all.forwarding: "1"
      exec:
        - ip link add lo-galactic type dummy
        - ip link set lo-galactic up
        - ip -6 route add blackhole 2001:db8:ff00:1010::1/128 metric 2048
        - ip -6 route add blackhole 2001:db8:ff00:1020::1/128 metric 2048
        - /galactic/scripts/install.sh

    sjc-control-plane:
      kind: ext-container
      labels:
        cluster: sjc
        graph-group: kind-control-plane
        graph-level: 1
        graph-icon: server
        platform: kind
        reload: disabled
      mgmt-ipv6: fc00:10::122
      sysctls:
        fs.inotify.max_user_instances: "256"
        net.ipv4.conf.all.arp_announce: "2"
        net.ipv4.ip_forward: "1"
        net.ipv6.conf.all.forwarding: "1"

    sjc-worker:
      kind: ext-container
      labels:
        cluster: sjc
        graph-group: kind-worker
        graph-level: 1
        graph-icon: server
        platform: kind
        reload: disabled
        worker-index: "1"
      mgmt-ipv6: fc00:10::123
      sysctls:
        fs.inotify.max_user_instances: "256"
        net.ipv4.conf.all.arp_announce: "2"
        net.ipv4.ip_forward: "1"
        net.ipv6.conf.all.forwarding: "1"
      exec:
        - ip link add lo-galactic type dummy
        - ip link set lo-galactic up
        - ip -6 route add blackhole 2001:db8:ff00:1010::2/128 metric 2048
        - ip -6 route add blackhole 2001:db8:ff00:1020::2/128 metric 2048
        - /galactic/scripts/install.sh

    iad-control-plane:
      kind: ext-container
      labels:
        cluster: iad
        graph-group: kind-control-plane
        graph-level: 1
        graph-icon: server
        platform: kind
        reload: disabled
      mgmt-ipv6: fc00:10::112
      sysctls:
        fs.inotify.max_user_instances: "256"
        net.ipv4.conf.all.arp_announce: "2"
        net.ipv4.ip_forward: "1"
        net.ipv6.conf.all.forwarding: "1"

    iad-worker:
      kind: ext-container
      labels:
        cluster: iad
        graph-group: kind-worker
        graph-level: 1
        graph-icon: server
        platform: kind
        reload: disabled
        worker-index: "1"
      mgmt-ipv6: fc00:10::113
      sysctls:
        fs.inotify.max_user_instances: "256"
        net.ipv4.conf.all.arp_announce: "2"
        net.ipv4.ip_forward: "1"
        net.ipv6.conf.all.forwarding: "1"
      exec:
        - ip link add lo-galactic type dummy
        - ip link set lo-galactic up
        - ip -6 route add blackhole 2001:db8:ff00:1010::3/128 metric 2048
        - ip -6 route add blackhole 2001:db8:ff00:1020::3/128 metric 2048
        - /galactic/scripts/install.sh

    iad-worker2:
      kind: ext-container
      labels:
        cluster: iad
        graph-group: kind-worker
        graph-level: 1
        graph-icon: server
        platform: kind
        reload: disabled
        worker-index: "2"
      mgmt-ipv6: fc00:10::114
      sysctls:
        fs.inotify.max_user_instances: "256"
        net.ipv4.conf.all.arp_announce: "2"
        net.ipv4.ip_forward: "1"
        net.ipv6.conf.all.forwarding: "1"
      exec:
        - ip link add lo-galactic type dummy
        - ip link set lo-galactic up
        - ip -6 route add blackhole 2001:db8:ff00:1010::4/128 metric 2048
        - ip -6 route add blackhole 2001:db8:ff00:1020::4/128 metric 2048
        - /galactic/scripts/install.sh

    tr1:
      group: transit
      labels:
        graph-group: transit
        graph-level: 2
        graph-icon: router
      entrypoint: /node_files/startup.sh
      binds:
        - group_files/transit/daemons:/etc/frr/daemons:ro
        - node_files/tr1/startup.sh:/node_files/startup.sh:ro
        - node_files/tr1/frr.conf:/etc/frr/frr.conf:ro

    tr2:
      group: transit
      labels:
        graph-group: transit
        graph-level: 2
        graph-icon: router
      entrypoint: /node_files/startup.sh
      binds:
        - group_files/transit/daemons:/etc/frr/daemons:ro
        - node_files/tr2/startup.sh:/node_files/startup.sh:ro
        - node_files/tr2/frr.conf:/etc/frr/frr.conf:ro

    tr3:
      group: transit
      labels:
        graph-group: transit
        graph-level: 2
        graph-icon: router
      entrypoint: /node_files/startup.sh
      binds:
        - group_files/transit/daemons:/etc/frr/daemons:ro
        - node_files/tr3/startup.sh:/node_files/startup.sh:ro
        - node_files/tr3/frr.conf:/etc/frr/frr.conf:ro

    tr4:
      group: transit
      labels:
        graph-group: transit
        graph-level: 2
        graph-icon: router
      entrypoint: /node_files/startup.sh
      binds:
        - group_files/transit/daemons:/etc/frr/daemons:ro
        - node_files/tr4/startup.sh:/node_files/startup.sh:ro
        - node_files/tr4/frr.conf:/etc/frr/frr.conf:ro

  links:
    # Cluster worker uplinks
    - endpoints: ["dfw-worker:eth1", "tr1:eth1"]
    - endpoints: ["sjc-worker:eth1", "tr2:eth1"]
    - endpoints: ["iad-worker:eth1", "tr3:eth5"]
    - endpoints: ["iad-worker2:eth1", "tr3:eth4"]

    # TR full mesh (iBGP within AS 65100)
    - endpoints: ["tr1:eth2", "tr2:eth2"]
    - endpoints: ["tr1:eth3", "tr3:eth1"]
    - endpoints: ["tr1:eth4", "tr4:eth1"]
    - endpoints: ["tr2:eth3", "tr3:eth2"]
    - endpoints: ["tr2:eth4", "tr4:eth2"]
    - endpoints: ["tr3:eth3", "tr4:eth3"]
