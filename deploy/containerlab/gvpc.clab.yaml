---
name: gvpc

mgmt:
  network: mgmt
  ipv4-subnet: 172.20.20.0/24

topology:
  defaults:
    kind: linux
    binds:
      - group_files/common/vtysh.conf:/etc/frr/vtysh.conf:ro
      - group_files/common/startup-lib.sh:/opt/lab/startup-lib.sh:ro
      - group_files/common/hosts:/etc/hosts:ro

  kinds:
    linux:
      image: frrouting/frr:latest
    k8s-kind:
      image: kindest/node:galactic

  nodes:
    iad:
      kind: k8s-kind
      startup-config: node_files/iad/config.yaml
      labels:
        graph-group: kind-cluster
        graph-level: 1
        graph-icon: server
        reload: disabled
      mgmt-ipv4: 172.20.20.101
      extras:
        k8s_kind:
          deploy:
            wait: 0s
            kubeconfig: iad.kubeconfig

    iad-control-plane:
      kind: ext-container
      labels:
        cluster: iad
        graph-group: kind-control-plane
        graph-level: 1
        graph-icon: server
        platform: kind
        reload: disabled
      mgmt-ipv4: 172.20.20.102
      sysctls:
        fs.inotify.max_user_instances: "256"
        net.ipv4.conf.all.arp_announce: "2"
        net.ipv4.ip_forward: "1"
        net.ipv6.conf.all.forwarding: "1"
      exec:
        - /galactic/scripts/install.sh

    iad-worker:
      kind: ext-container
      labels:
        cluster: iad
        graph-group: kind-worker
        graph-level: 1
        graph-icon: server
        platform: kind
        reload: disabled
        worker-index: "1"
      mgmt-ipv4: 172.20.20.103
      sysctls:
        fs.inotify.max_user_instances: "256"
        net.ipv4.conf.all.arp_announce: "2"
        net.ipv4.ip_forward: "1"
        net.ipv6.conf.all.forwarding: "1"
      exec:
        - ip link add lo-galactic type dummy
        - ip link set lo-galactic up
        - ip -6 addr add 2001:db8:ff01:100:ffff:ffff:ffff:ffff/128 dev lo-galactic
        - /galactic/scripts/install.sh

    sjc:
      kind: k8s-kind
      startup-config: node_files/sjc/config.yaml
      labels:
        graph-group: kind-cluster
        graph-level: 1
        graph-icon: server
        reload: disabled
      mgmt-ipv4: 172.20.20.121
      extras:
        k8s_kind:
          deploy:
            wait: 0s
            kubeconfig: sjc.kubeconfig

    sjc-control-plane:
      kind: ext-container
      labels:
        cluster: sjc
        graph-group: kind-control-plane
        graph-level: 1
        graph-icon: server
        platform: kind
        reload: disabled
      mgmt-ipv4: 172.20.20.122
      sysctls:
        fs.inotify.max_user_instances: "256"
        net.ipv4.conf.all.arp_announce: "2"
        net.ipv4.ip_forward: "1"
        net.ipv6.conf.all.forwarding: "1"
      exec:
        - /galactic/scripts/install.sh

    sjc-worker:
      kind: ext-container
      labels:
        cluster: sjc
        graph-group: kind-worker
        graph-level: 1
        graph-icon: server
        platform: kind
        reload: disabled
        worker-index: "1"
      mgmt-ipv4: 172.20.20.123
      sysctls:
        fs.inotify.max_user_instances: "256"
        net.ipv4.conf.all.arp_announce: "2"
        net.ipv4.ip_forward: "1"
        net.ipv6.conf.all.forwarding: "1"
      exec:
        - ip link add lo-galactic type dummy
        - ip link set lo-galactic up
        - ip -6 addr add 2001:db8:ff02:100:ffff:ffff:ffff:ffff/128 dev lo-galactic
        - /galactic/scripts/install.sh

    infra:
      kind: k8s-kind
      startup-config: node_files/infra/config.yaml
      labels:
        graph-group: kind-cluster
        graph-level: 1
        graph-icon: server
        reload: disabled
      mgmt-ipv4: 172.20.20.111
      extras:
        k8s_kind:
          deploy:
            wait: 0s
            kubeconfig: infra.kubeconfig

    infra-control-plane:
      kind: ext-container
      labels:
        cluster: infra
        graph-group: kind-control-plane
        graph-level: 1
        graph-icon: server
        platform: kind
        reload: disabled
      mgmt-ipv4: 172.20.20.112
      sysctls:
        fs.inotify.max_user_instances: "256"
        net.ipv4.conf.all.arp_announce: "2"
        net.ipv4.ip_forward: "1"
        net.ipv6.conf.all.forwarding: "1"
      exec:
        - /galactic/scripts/install.sh

    infra-worker:
      kind: ext-container
      labels:
        cluster: infra
        graph-group: kind-worker
        graph-level: 1
        graph-icon: server
        platform: kind
        reload: disabled
        worker-index: "1"
      mgmt-ipv4: 172.20.20.113
      sysctls:
        fs.inotify.max_user_instances: "256"
        net.ipv4.conf.all.arp_announce: "2"
        net.ipv4.ip_forward: "1"
        net.ipv6.conf.all.forwarding: "1"
      exec:
        - ip link add lo-galactic type dummy
        - ip link set lo-galactic up
        - ip -6 addr add 2001:db8:ff03:100:ffff:ffff:ffff:ffff/128 dev lo-galactic
        - /galactic/scripts/install.sh

    tr1:
      group: transit
      labels:
        graph-group: transit
        graph-level: 2
        graph-icon: router
      entrypoint: /node_files/startup.sh
      binds:
        - group_files/transit/daemons:/etc/frr/daemons:ro
        - node_files/tr1/startup.sh:/node_files/startup.sh:ro
        - node_files/tr1/frr.conf:/etc/frr/frr.conf:ro

    tr2:
      group: transit
      labels:
        graph-group: transit
        graph-level: 2
        graph-icon: router
      entrypoint: /node_files/startup.sh
      binds:
        - group_files/transit/daemons:/etc/frr/daemons:ro
        - node_files/tr2/startup.sh:/node_files/startup.sh:ro
        - node_files/tr2/frr.conf:/etc/frr/frr.conf:ro

    tr3:
      group: transit
      labels:
        graph-group: transit
        graph-level: 2
        graph-icon: router
      entrypoint: /node_files/startup.sh
      binds:
        - group_files/transit/daemons:/etc/frr/daemons:ro
        - node_files/tr3/startup.sh:/node_files/startup.sh:ro
        - node_files/tr3/frr.conf:/etc/frr/frr.conf:ro

    tr4:
      group: transit
      labels:
        graph-group: transit
        graph-level: 2
        graph-icon: router
      entrypoint: /node_files/startup.sh
      binds:
        - group_files/transit/daemons:/etc/frr/daemons:ro
        - node_files/tr4/startup.sh:/node_files/startup.sh:ro
        - node_files/tr4/frr.conf:/etc/frr/frr.conf:ro

  links:
    # Cluster worker uplinks
    - endpoints: ["iad-worker:eth1", "tr1:eth1"]
    - endpoints: ["sjc-worker:eth1", "tr2:eth1"]
    - endpoints: ["infra-worker:eth1", "tr3:eth5"]

    # TR full mesh (iBGP within AS 65100)
    - endpoints: ["tr1:eth2", "tr2:eth2"]
    - endpoints: ["tr1:eth3", "tr3:eth1"]
    - endpoints: ["tr1:eth4", "tr4:eth1"]
    - endpoints: ["tr2:eth3", "tr3:eth2"]
    - endpoints: ["tr2:eth4", "tr4:eth2"]
    - endpoints: ["tr3:eth3", "tr4:eth3"]
