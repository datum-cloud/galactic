apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: galactic-router
  namespace: galactic-system
  labels:
    app.kubernetes.io/name: galactic-router
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: galactic-router
  template:
    metadata:
      labels:
        app.kubernetes.io/name: galactic-router
    spec:
      serviceAccountName: galactic-router
      hostNetwork: true
      tolerations:
        - operator: Exists
      containers:
        - name: galactic-router
          image: ghcr.io/datum-cloud/galactic:latest
          command:
            - /galactic-router
          env:
            - name: GALACTIC_ROUTER_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: GALACTIC_ROUTER_ROUTER_MODE
              value: tenant
            - name: GALACTIC_ROUTER_GC_NAMESPACE
              value: galactic-system
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: grpc-health
              containerPort: 5000
              protocol: TCP
          livenessProbe:
            grpc:
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            grpc:
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            runAsUser: 0
            capabilities:
              add:
                - NET_ADMIN
            allowPrivilegeEscalation: false
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
