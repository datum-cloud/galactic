apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: galactic-agent
  namespace: galactic-system
  labels:
    app: galactic-agent
spec:
  selector:
    matchLabels:
      app: galactic-agent
  template:
    metadata:
      labels:
        app: galactic-agent
    spec:
      serviceAccountName: galactic-agent
      hostNetwork: false
      tolerations:
        - operator: Exists
      containers:
        - name: galactic-agent
          image: ghcr.io/datum-cloud/galactic:latest
          args:
            - --port=33438
            - --health-port=5000
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          ports:
            - name: grpc
              containerPort: 33438
              protocol: TCP
            - name: health
              containerPort: 5000
              protocol: TCP
          livenessProbe:
            grpc:
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            grpc:
              port: 5000
              service: readyz
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            capabilities:
              add: ["NET_ADMIN"]
            allowPrivilegeEscalation: false
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
