apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: galactic-agent
  namespace: galactic-system
  labels:
    app: galactic-agent
spec:
  selector:
    matchLabels:
      app: galactic-agent
  template:
    metadata:
      labels:
        app: galactic-agent
    spec:
      serviceAccountName: galactic-agent
      hostNetwork: false
      tolerations:
        - operator: Exists
      containers:
        - name: galactic-agent
          image: ghcr.io/datum-cloud/galactic:latest
          args:
            - --gobgp-enabled=true
            - --gobgp-api-port=50051
            - --gobgp-log-level=panic
            - --metrics-addr=:8082
            - --health-addr=:8083
            - --grpc-health-port=8084
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          ports:
            - name: metrics
              containerPort: 8082
              protocol: TCP
            - name: healthz
              containerPort: 8083
              protocol: TCP
            - name: grpc-health
              containerPort: 8084
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: healthz
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: healthz
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            capabilities:
              add: ["NET_ADMIN"]
            allowPrivilegeEscalation: false
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
