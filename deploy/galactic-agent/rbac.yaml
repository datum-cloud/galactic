apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: galactic-agent
rules:
  # BGP CRDs from go.miloapis.com/cosmos
  - apiGroups: ["bgp.miloapis.com"]
    resources:
      - bgpinstances
      - bgppeers
      - bgpadvertisements
      - bgproutepolicies
    verbs: ["get", "list", "watch"]
  - apiGroups: ["bgp.miloapis.com"]
    resources:
      - bgpinstances/status
      - bgppeers/status
      - bgpadvertisements/status
      - bgproutepolicies/status
    verbs: ["get", "update", "patch"]
  # Provider CRDs from go.miloapis.com/cosmos
  - apiGroups: ["providers.bgp.miloapis.com"]
    resources:
      - bgpproviders
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["providers.bgp.miloapis.com"]
    resources:
      - bgpproviders/status
    verbs: ["get", "update", "patch"]
  # Leader election
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Events
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: galactic-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: galactic-agent
subjects:
  - kind: ServiceAccount
    name: galactic-agent
    namespace: galactic-system
